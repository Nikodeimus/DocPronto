name: Publicar no GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Baixar o projeto
        uses: actions/checkout@v4

      - name: Configurar o GitHub Pages
        uses: actions/configure-pages@v5

      - name: Preparar os arquivos do site
        shell: bash
        run: |
          mkdir -p _site
          cp index.html styles.css app.js .nojekyll _site/

      - name: Empacotar o site
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar
        id: deployment
        uses: actions/deploy-pages@v4
